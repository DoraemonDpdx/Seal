name: Desktop Windows Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-windows.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-windows.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v3

      - name: Build Windows installers
        run: ./gradlew :desktop:packageMsi :desktop:packageExe

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Seal-desktop-windows
          path: |
            desktop/build/compose/binaries/main/msi/*.msi
            desktop/build/compose/binaries/main/exe/*.exe
